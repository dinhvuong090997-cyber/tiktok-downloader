<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TikTok Downloader - Không Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(255,0,80,.08),transparent 50%),radial-gradient(circle at 70% 80%,rgba(0,242,234,.06),transparent 50%),radial-gradient(circle at 50% 50%,rgba(100,100,255,.04),transparent 60%)}
.container{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:24px 20px;min-height:100vh;display:flex;flex-direction:column}
.logo{text-align:center;padding:32px 0 20px}
.logo .icon{display:inline-block;width:56px;height:56px;background:linear-gradient(135deg,#ff0050,#ff6b6b);border-radius:18px;margin-bottom:12px;position:relative;box-shadow:0 8px 32px rgba(255,0,80,.25)}
.logo .icon::after{content:'⬇';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px}
.logo h1{font-size:26px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,#a0a0b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{display:block;font-size:13px;color:#666;margin-top:4px}
.card-box{background:#12121a;border:1px solid #1e1e2a;border-radius:20px;padding:20px;margin-bottom:16px}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:14px 16px;background:#0a0a0f;border:1.5px solid #1e1e2a;border-radius:14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.input-row input:focus{border-color:#ff0050;box-shadow:0 0 0 3px rgba(255,0,80,.1)}
.input-row input::placeholder{color:#444}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 20px;background:linear-gradient(135deg,#ff0050,#ff3370);border:none;border-radius:14px;color:#fff;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 4px 16px rgba(255,0,80,.3)}
.btn:active{transform:scale(.96);box-shadow:0 2px 8px rgba(255,0,80,.2)}
.btn svg{width:18px;height:18px}
.result-card{background:#12121a;border:1px solid #1e1e2a;border-radius:20px;overflow:hidden;animation:slideUp .3s ease}
.result-card .thumb{width:100%;aspect-ratio:9/16;background:#0a0a0f;display:flex;align-items:center;justify-content:center;color:#333;font-size:48px}
.result-card .info{padding:16px}
.result-card .author{color:#00f2ea;font-weight:600;font-size:14px;margin-bottom:4px}
.result-card .title{color:#a0a0b0;font-size:13px;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-card .meta{display:flex;gap:16px;color:#555;font-size:12px;margin-bottom:14px}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:linear-gradient(135deg,#00c853,#00e676);border:none;border-radius:14px;color:#000;font-weight:700;font-size:15px;font-family:inherit;text-decoration:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(0,200,83,.25)}
.dl-btn:active{transform:scale(.97)}
.dl-btn svg{width:20px;height:20px}
.loading{text-align:center;padding:40px 20px}
.pulse{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff0050,#ff6b6b);margin:0 auto 16px;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.error{background:#1a0000;border:1px solid #ff444420;border-radius:16px;padding:16px;text-align:center;color:#ff6666;font-size:13px}
.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.feat{background:#12121a;border:1px solid #1e1e2a;border-radius:14px;padding:14px;text-align:center}
.feat .icon{font-size:22px;margin-bottom:6px}
.feat .label{font-size:11px;color:#555;font-weight:500}
.footer{text-align:center;color:#333;font-size:11px;padding:24px;margin-top:auto}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
<div class="logo">
<div class="icon"></div>
<h1>TikTok Downloader</h1>
<span>Tải video không logo • Chất lượng HD</span>
</div>

<div class="card-box">
<div class="input-row">
<input id="url" type="text" placeholder="Dán link TikTok vào đây..." autocomplete="off">
<button class="btn" onclick="downloadVideo()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
Tải
</button>
</div>
</div>

<div id="result"></div>

<div class="features">
<div class="feat"><div class="icon">🎬</div><div class="label">Không logo</div></div>
<div class="feat"><div class="icon">⚡</div><div class="label">Tốc độ cao</div></div>
<div class="feat"><div class="icon">📱</div><div class="label">HD gốc</div></div>
<div class="feat"><div class="icon">🔒</div><div class="label">Riêng tư</div></div>
</div>

<div class="footer">Dán link → Nhấn Tải → Video về máy</div>
</div>

<script>
async function downloadVideo() {
  const url = document.getElementById('url').value.trim()
  if (!url.includes('tiktok.com')) {
    document.getElementById('result').innerHTML = '<div class="error">❌ Vui lòng dán link TikTok</div>'
    return
  }
  document.getElementById('result').innerHTML = '<div class="loading"><div class="pulse"></div><p style="color:#666;font-size:14px">Đang lấy video...</p></div>'

  try {
    const resp = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`)
    const data = await resp.json()
    if (data.code !== 0 || !data.data) throw new Error('No data')
    const d = data.data
    const videoUrl = d.play || d.hdplay
    if (!videoUrl) throw new Error('No URL')
    const title = (d.title || 'TikTok').substring(0, 80)
    const author = d.author?.nickname || 'Unknown'
    const plays = (d.play_count || 0).toLocaleString()
    const isLocal = location.hostname === 'localhost' || location.hostname.startsWith('192.168')
    const dlUrl = isLocal ? `/download?url=${encodeURIComponent(videoUrl)}` : videoUrl

    document.getElementById('result').innerHTML = `
      <div class="result-card">
        <div class="thumb">🎵</div>
        <div class="info">
          <div class="author">👤 ${author}</div>
          <div class="title">${title}</div>
          <div class="meta"><span>▶️ ${plays}</span><span>🎬 Không logo</span></div>
          <a class="dl-btn" href="${dlUrl}" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            TẢI VIDEO
          </a>
        </div>
      </div>`
  } catch(e) {
    document.getElementById('result').innerHTML = '<div class="error">❌ Không tải được. Kiểm tra link hoặc thử lại.</div>'
  }
}
document.getElementById('url').addEventListener('keydown', e => { if(e.key==='Enter') downloadVideo() })
</script>
</body>
</html>
